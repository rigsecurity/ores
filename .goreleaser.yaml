version: 2

before:
  hooks:
    - buf generate

builds:
  - id: ores
    main: ./cmd/ores
    binary: ores
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

  - id: oresd
    main: ./cmd/oresd
    binary: oresd
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

  - id: ores-wasm
    main: ./pkg/wasm
    binary: ores
    goos: [wasip1]
    goarch: [wasm]
    ldflags:
      - -s -w

kos:
  - id: oresd
    main: ./cmd/oresd
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - latest
      - "{{.Version}}"
    sbom: spdx

archives:
  - id: ores
    builds: [ores]
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

  - id: oresd
    builds: [oresd]
    format: tar.gz

  - id: wasm
    builds: [ores-wasm]
    format: tar.gz
    name_template: "ores-wasm_{{ .Version }}"

checksum:
  name_template: checksums.txt

signs:
  - cmd: cosign
    args: ["sign-blob", "--yes", "--output-signature=${signature}", "${artifact}"]
    artifacts: checksum

brews:
  - ids: [ores]
    repository:
      owner: rigsecurity
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/rigsecurity/ores
    description: "Open Risk Evaluation & Scoring — deterministic cybersecurity risk scoring engine"
    license: Apache-2.0
    test: |
      system bin/"ores", "version"
    install: |
      bin.install "ores"

scoops:
  - ids: [ores]
    repository:
      owner: rigsecurity
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/rigsecurity/ores
    description: "Open Risk Evaluation & Scoring — deterministic cybersecurity risk scoring engine"
    license: Apache-2.0

nfpms:
  - id: ores
    builds: [ores]
    package_name: ores
    vendor: Rig Security
    homepage: https://github.com/rigsecurity/ores
    maintainer: Rig Security <oss@rig.security>
    description: "Open Risk Evaluation & Scoring — deterministic cybersecurity risk scoring engine"
    license: Apache-2.0
    formats: [deb, rpm]
    section: utils

  - id: oresd
    builds: [oresd]
    package_name: oresd
    vendor: Rig Security
    homepage: https://github.com/rigsecurity/ores
    maintainer: Rig Security <oss@rig.security>
    description: "ORES scoring daemon — HTTP + gRPC via ConnectRPC"
    license: Apache-2.0
    formats: [deb, rpm]
    section: utils
    contents:
      - src: packaging/oresd.service
        dst: /usr/lib/systemd/system/oresd.service
        type: config

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^test"
