version: '3'

vars:
  BINARY_DIR: bin

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  lint:
    desc: Run golangci-lint
    cmds:
      - go tool golangci-lint run ./...

  test:
    desc: Run tests with race detector
    cmds:
      - go test -race -coverprofile=coverage.txt ./...

  test:short:
    desc: Run tests without race detector
    cmds:
      - go test -short ./...

  build:
    desc: Build all binaries
    cmds:
      - go build -o {{.BINARY_DIR}}/ores ./cmd/ores
      - go build -o {{.BINARY_DIR}}/oresd ./cmd/oresd

  build:wasm:
    desc: Build WASM module
    cmds:
      - GOOS=wasip1 GOARCH=wasm go build -o {{.BINARY_DIR}}/ores.wasm ./pkg/wasm

  generate:
    desc: Generate protobuf code
    cmds:
      - buf generate

  bench:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem -run=^$ ./...

  fuzz:
    desc: Run fuzz tests (30s per target)
    cmds:
      - go test -fuzz=Fuzz -fuzztime=30s ./pkg/engine/
      - go test -fuzz=Fuzz -fuzztime=30s ./pkg/signals/parsers/

  test:cover:
    desc: Generate and open HTML coverage report
    cmds:
      - go test -coverprofile=coverage.txt ./...
      - go tool cover -html=coverage.txt

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BINARY_DIR}} dist coverage.txt gen
