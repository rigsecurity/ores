<svg xmlns="http://www.w3.org/2000/svg" width="240" height="52" viewBox="0 0 240 52" fill="none">
  <!-- Shield outline using polygon (no arcs) -->
  <polygon points="22,3 40,11 39,32 22,46 5,32 4,11" fill="none" stroke="#35D2AE" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Gauge face - semicircle approximated with short line segments -->
  <!-- Outer gauge ring -->
  <line x1="12" y1="30" x2="9" y2="22" stroke="#35D2AE" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="9" y1="22" x2="12" y2="15" stroke="#35D2AE" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="12" y1="15" x2="17" y2="11" stroke="#35D2AE" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="17" y1="11" x2="22" y2="10" stroke="#35D2AE" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="22" y1="10" x2="27" y2="11" stroke="#35D2AE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="11" x2="32" y2="15" stroke="#35D2AE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="15" x2="35" y2="22" stroke="#35D2AE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="22" x2="32" y2="30" stroke="#35D2AE" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Needle pointing to ~70% (upper right = high score) -->
  <line x1="22" y1="24" x2="31" y2="14" stroke="#35D2AE" stroke-width="2" stroke-linecap="round"/>

  <!-- Center pivot dot -->
  <circle cx="22" cy="24" r="2.5" fill="#35D2AE"/>

  <!-- ORES wordmark -->
  <text x="56" y="36" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="-0.5" fill="#FAFAFA">ORES</text>
</svg>
