<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35D2AE"/>
      <stop offset="100%" stop-color="#746BE9"/>
    </linearGradient>
  </defs>

  <!-- Calculator icon - minimal outline -->
  <g transform="translate(16, 12)">
    <!-- Calculator body -->
    <rect x="0" y="0" width="38" height="52" rx="6" fill="none" stroke="#35D2AE" stroke-width="2"/>
    <!-- Screen -->
    <rect x="6" y="6" width="26" height="12" rx="2" fill="#35D2AE" opacity="0.15"/>
    <!-- Score number on screen -->
    <text x="19" y="16" font-family="monospace" font-size="10" font-weight="700" fill="#35D2AE" text-anchor="middle">89</text>
    <!-- Button grid -->
    <circle cx="11" cy="28" r="2.5" fill="#35D2AE" opacity="0.5"/>
    <circle cx="19" cy="28" r="2.5" fill="#746BE9" opacity="0.5"/>
    <circle cx="27" cy="28" r="2.5" fill="#35D2AE" opacity="0.3"/>
    <circle cx="11" cy="36" r="2.5" fill="#746BE9" opacity="0.3"/>
    <circle cx="19" cy="36" r="2.5" fill="#35D2AE" opacity="0.3"/>
    <circle cx="27" cy="36" r="2.5" fill="#746BE9" opacity="0.5"/>
    <circle cx="11" cy="44" r="2.5" fill="#35D2AE" opacity="0.3"/>
    <circle cx="19" cy="44" r="2.5" fill="#746BE9" opacity="0.3"/>
    <circle cx="27" cy="44" r="2.5" fill="#35D2AE" opacity="0.5"/>
  </g>

  <!-- ORES text -->
  <text x="72" y="52" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="46" font-weight="800" letter-spacing="-1.5" fill="#FAFAFA">ORES</text>
</svg>
