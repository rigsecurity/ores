<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" fill="none">
  <defs>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35D2AE"/>
      <stop offset="100%" stop-color="#746BE9"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#35D2AE"/>
      <stop offset="100%" stop-color="#746BE9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield icon -->
  <g transform="translate(20, 10)" filter="url(#glow)">
    <!-- Shield body -->
    <path d="M50 8 L90 22 C90 22 92 60 75 82 C65 95 50 100 50 100 C50 100 35 95 25 82 C8 60 10 22 10 22 L50 8Z"
          fill="url(#shield-grad)" opacity="0.15" stroke="url(#shield-grad)" stroke-width="2"/>

    <!-- Inner score rings -->
    <circle cx="50" cy="52" r="22" fill="none" stroke="#35D2AE" stroke-width="1.5" opacity="0.4"/>
    <circle cx="50" cy="52" r="16" fill="none" stroke="#746BE9" stroke-width="1.5" opacity="0.4"/>
    <circle cx="50" cy="52" r="10" fill="none" stroke="#35D2AE" stroke-width="1.5" opacity="0.6"/>

    <!-- Score arc (like a gauge) -->
    <path d="M32 64 A22 22 0 1 1 68 64" fill="none" stroke="url(#shield-grad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Center dot -->
    <circle cx="50" cy="52" r="3" fill="#35D2AE"/>

    <!-- Signal dots orbiting -->
    <circle cx="50" cy="30" r="2.5" fill="#35D2AE" opacity="0.9"/>
    <circle cx="68" cy="38" r="2" fill="#746BE9" opacity="0.8"/>
    <circle cx="72" cy="55" r="2" fill="#FBBF24" opacity="0.7"/>
    <circle cx="65" cy="70" r="1.8" fill="#22D3EE" opacity="0.7"/>
    <circle cx="35" cy="70" r="1.8" fill="#35D2AE" opacity="0.6"/>
    <circle cx="28" cy="55" r="2" fill="#746BE9" opacity="0.6"/>
    <circle cx="32" cy="38" r="2" fill="#F87171" opacity="0.7"/>
    <circle cx="50" cy="76" r="1.5" fill="#4ADE80" opacity="0.6"/>
  </g>

  <!-- ORES text -->
  <text x="130" y="72" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="58" font-weight="800" letter-spacing="-2" fill="url(#text-grad)">ORES</text>

  <!-- Tagline -->
  <text x="132" y="96" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="500" letter-spacing="3" fill="#A1A1AA" text-transform="uppercase">OPEN RISK EVALUATION &amp; SCORING</text>
</svg>
