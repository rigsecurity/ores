name: Bug Report
description: Report a bug in ORES
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Configure ORES with ...
        2. Run `ores evaluate ...`
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ORES Version
      description: Output of `ores version` or the release tag.
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, deployment mode (CLI / daemon / WASM), and any relevant config.
      placeholder: |
        OS: Linux (Ubuntu 22.04)
        Arch: amd64
        Mode: daemon (oresd)
        Config: ...
    validations:
      required: false
