name: Release

on:
  push:
    tags: ["v*"]

# SECURITY: This repo is public. Release workflow runs on GitHub-hosted runners only.
# - contents:write is needed for GoReleaser to create GitHub releases
# - packages:write is needed for pushing container images to ghcr.io
# - id-token:write is needed for Cosign keyless signing (OIDC)
# No org-level secrets are referenced. Only the auto-scoped GITHUB_TOKEN is used.

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run on tags pushed to the default branch
    if: github.repository == 'rigsecurity/ores'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@v1
      - run: buf generate
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
