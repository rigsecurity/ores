name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# SECURITY: This repo is public. Workflows run on GitHub-hosted runners only.
# No self-hosted runners. No access to Rig internal infrastructure.
# Only the default GITHUB_TOKEN is used (auto-scoped, read-only for PRs).
# No org-level secrets are referenced or accessible.

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@v1
      - run: buf generate
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@v1
      - run: buf generate
      - run: go test -race -coverprofile=coverage.txt ./...

  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: bufbuild/buf-setup-action@v1
      - run: buf generate
      - run: go build ./cmd/ores
      - run: go build ./cmd/oresd
      - run: GOOS=wasip1 GOARCH=wasm go build -o ores.wasm ./pkg/wasm
